<svg width="780" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="hatch" width="20" height="20" patternUnits="userSpaceOnUse">
      <line x1="0" y1="20" x2="20" y2="0" stroke="#252525" stroke-width="1.2"/>
    </pattern>
    <marker id="ah_o" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,1 L6,3.5 L0,6 Z" fill="#ff7c43"/>
    </marker>
    <marker id="ah_o_r" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto-start-reverse">
      <path d="M0,1 L6,3.5 L0,6 Z" fill="#ff7c43"/>
    </marker>
    <marker id="ah_b" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,1 L6,3.5 L0,6 Z" fill="#3a6aaa"/>
    </marker>
    <marker id="ah_b_r" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto-start-reverse">
      <path d="M0,1 L6,3.5 L0,6 Z" fill="#3a6aaa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="800" fill="#0d1117"/>

  <!-- Ground -->
  <line x1="0" y1="730" x2="780" y2="730" stroke="#444" stroke-width="2"/>
  <rect x="0" y="730" width="780" height="70" fill="url(#hatch)" opacity="0.6"/>
  <rect x="0" y="730" width="780" height="70" fill="#0d1117" opacity="0.35"/>

  <!-- ========== OLD CONFIG — dashed blue ========== -->
  <!-- joints: coxa(170,476) knee(284,279) foot(544,730) -->

  <!-- Body old -->
  <rect x="8" y="452" width="162" height="48" rx="6"
        fill="#080f1e" stroke="#2a4a7a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="89" y="471" text-anchor="middle" fill="#3a6aaa"
        font-size="11" font-family="monospace" font-weight="bold">CURRENT</text>
  <text x="89" y="487" text-anchor="middle" fill="#3a6aaa"
        font-size="10" font-family="monospace">H = 390 mm</text>

  <!-- Femur old -->
  <line x1="170" y1="476" x2="284" y2="279"
        stroke="#2a5a9a" stroke-width="3.5" stroke-dasharray="10,5" stroke-linecap="round"/>
  <!-- Tibia old -->
  <line x1="284" y1="279" x2="544" y2="730"
        stroke="#2a5a9a" stroke-width="3.5" stroke-dasharray="10,5" stroke-linecap="round"/>

  <!-- Joints old -->
  <circle cx="170" cy="476" r="8" fill="#080f1e" stroke="#2a5a9a" stroke-width="2"/>
  <circle cx="284" cy="279" r="8" fill="#080f1e" stroke="#2a5a9a" stroke-width="2"/>
  <circle cx="544" cy="730" r="6" fill="#2a5a9a"/>

  <!-- Angle arc at coxa: 60° above horizontal -->
  <!-- horizontal ref -->
  <line x1="170" y1="476" x2="220" y2="476"
        stroke="#2a5a9a" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <!-- arc from (210,476) CCW to (170+40·cos60, 476−40·sin60)=(190,441) -->
  <path d="M 210,476 A 40,40,0,0,0,190,441"
        fill="none" stroke="#2a5a9a" stroke-width="1.5"/>
  <text x="218" y="458" fill="#5a8aaa" font-size="12" font-family="monospace">60°↑</text>

  <!-- Angle arc at knee: 60° below horizontal -->
  <line x1="284" y1="279" x2="334" y2="279"
        stroke="#2a5a9a" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <!-- arc from (324,279) CW to (284+40·cos60, 279+40·sin60)=(304,314) -->
  <path d="M 324,279 A 40,40,0,0,1,304,314"
        fill="none" stroke="#2a5a9a" stroke-width="1.5"/>
  <text x="326" y="318" fill="#5a8aaa" font-size="12" font-family="monospace">60°↓</text>

  <!-- Knee angle label old -->
  <text x="252" y="267" fill="#5a8aaa" font-size="11" font-family="monospace">∠ 120°</text>

  <!-- Segment length labels old (near midpoints) -->
  <!-- femur mid ≈ (227,378), tibia mid ≈ (414,505) -->
  <text x="218" y="380" fill="#2a4a7a" font-size="10" font-family="monospace"
        text-anchor="middle">350</text>
  <text x="430" y="494" fill="#2a4a7a" font-size="10" font-family="monospace"
        text-anchor="middle">800</text>

  <!-- ========== NEW CONFIG — solid orange ========== -->
  <!-- joints: coxa(170,145) knee(367,259) foot(587,730) -->

  <!-- Body new -->
  <rect x="8" y="121" width="162" height="48" rx="6"
        fill="#1c0800" stroke="#ff7c43" stroke-width="2"/>
  <text x="89" y="140" text-anchor="middle" fill="#ff7c43"
        font-size="11" font-family="monospace" font-weight="bold">NEW</text>
  <text x="89" y="156" text-anchor="middle" fill="#ff9a63"
        font-size="10" font-family="monospace">H = 900 mm</text>

  <!-- Femur new -->
  <line x1="170" y1="145" x2="367" y2="259"
        stroke="#ff7c43" stroke-width="4" stroke-linecap="round"/>
  <!-- Tibia new -->
  <line x1="367" y1="259" x2="587" y2="730"
        stroke="#ffaa63" stroke-width="4" stroke-linecap="round"/>

  <!-- Joints new -->
  <circle cx="170" cy="145" r="9" fill="#1c0800" stroke="#ff7c43" stroke-width="2.5"/>
  <circle cx="367" cy="259" r="11" fill="#1c0800" stroke="#ff7c43" stroke-width="2.5"/>
  <circle cx="587" cy="730" r="8" fill="#ff7c43"/>

  <!-- Angle arc at coxa: 30° below horizontal -->
  <line x1="170" y1="145" x2="222" y2="145"
        stroke="#ff7c43" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- arc from (210,145) CW to (170+40·cos30, 145+40·sin30)=(205,165) -->
  <path d="M 210,145 A 40,40,0,0,1,205,165"
        fill="none" stroke="#ff7c43" stroke-width="1.5"/>
  <text x="218" y="178" fill="#ffaa73" font-size="12" font-family="monospace">30°↓</text>

  <!-- Angle arc at knee: 65° below horizontal -->
  <line x1="367" y1="259" x2="419" y2="259"
        stroke="#ff7c43" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- arc from (407,259) CW to (367+40·cos65, 259+40·sin65)=(384,295) -->
  <path d="M 407,259 A 40,40,0,0,1,384,295"
        fill="none" stroke="#ff7c43" stroke-width="1.5"/>
  <text x="413" y="302" fill="#ffaa73" font-size="12" font-family="monospace">65°↓</text>

  <!-- Knee angle label new -->
  <text x="334" y="248" fill="#ffaa73" font-size="11" font-family="monospace">∠ 145°</text>

  <!-- Segment length labels new -->
  <!-- femur mid ≈ (268,202), tibia mid ≈ (477,495) -->
  <text x="256" y="196" fill="#cc5020" font-size="10" font-family="monospace"
        text-anchor="middle">350</text>
  <text x="464" y="488" fill="#cc5020" font-size="10" font-family="monospace"
        text-anchor="middle">800</text>

  <!-- ========== HEIGHT DIMENSION LINES ========== -->

  <!-- Old height: x=610, y 476→730 -->
  <line x1="170" y1="476" x2="613" y2="476"
        stroke="#2a4a7a" stroke-width="0.8" stroke-dasharray="5,5" opacity="0.4"/>
  <!-- bottom leader (ground already at 730, no need to draw) -->
  <line x1="610" y1="476" x2="610" y2="730"
        stroke="#3a6aaa" stroke-width="1.5"
        marker-start="url(#ah_b_r)" marker-end="url(#ah_b)"/>
  <text x="618" y="609" fill="#4a7aaa" font-size="13" font-family="monospace">390</text>
  <text x="618" y="624" fill="#4a7aaa" font-size="13" font-family="monospace">mm</text>

  <!-- New height: x=635, y 145→730 -->
  <line x1="170" y1="145" x2="638" y2="145"
        stroke="#cc4010" stroke-width="0.8" stroke-dasharray="5,5" opacity="0.4"/>
  <line x1="635" y1="145" x2="635" y2="730"
        stroke="#ff7c43" stroke-width="1.5"
        marker-start="url(#ah_o_r)" marker-end="url(#ah_o)"/>
  <text x="643" y="432" fill="#ffaa73" font-size="13" font-family="monospace">900</text>
  <text x="643" y="447" fill="#ffaa73" font-size="13" font-family="monospace">mm</text>

  <!-- ========== REACH DIMENSION LINES (below ground) ========== -->

  <!-- Old reach: y=750, x 170→544 -->
  <line x1="170" y1="750" x2="544" y2="750"
        stroke="#3a6aaa" stroke-width="1.5"
        marker-start="url(#ah_b_r)" marker-end="url(#ah_b)"/>
  <text x="357" y="765" text-anchor="middle" fill="#4a7aaa"
        font-size="11" font-family="monospace">575 mm</text>

  <!-- New reach: y=775, x 170→587 -->
  <line x1="170" y1="775" x2="587" y2="775"
        stroke="#ff7c43" stroke-width="1.5"
        marker-start="url(#ah_o_r)" marker-end="url(#ah_o)"/>
  <text x="378" y="790" text-anchor="middle" fill="#ffaa73"
        font-size="11" font-family="monospace">641 mm</text>

  <!-- ========== TORQUE SUMMARY TABLE ========== -->
  <rect x="668" y="20" width="104" height="178" rx="5"
        fill="#0a0f18" stroke="#222" stroke-width="1"/>

  <text x="720" y="40" text-anchor="middle" fill="#666"
        font-size="10" font-family="monospace" font-weight="bold">TORQUES</text>
  <line x1="672" y1="44" x2="768" y2="44" stroke="#222" stroke-width="1"/>

  <text x="680" y="58" fill="#555" font-size="9" font-family="monospace">          net  ×</text>

  <line x1="672" y1="62" x2="768" y2="62" stroke="#222" stroke-width="1"/>
  <text x="680" y="75" fill="#444" font-size="9" font-family="monospace">femur</text>
  <text x="680" y="88" fill="#3a6aaa" font-size="9" font-family="monospace">cur: 129Nm 1.6</text>
  <text x="680" y="100" fill="#ff7c43" font-size="9" font-family="monospace">new: 137Nm 1.5</text>

  <line x1="672" y1="105" x2="768" y2="105" stroke="#222" stroke-width="1"/>
  <text x="680" y="118" fill="#444" font-size="9" font-family="monospace">tibia</text>
  <text x="680" y="131" fill="#3a6aaa" font-size="9" font-family="monospace">cur:  97Nm 2.1</text>
  <text x="680" y="143" fill="#ff7c43" font-size="9" font-family="monospace">new:  82Nm 2.5</text>

  <line x1="672" y1="148" x2="768" y2="148" stroke="#222" stroke-width="1"/>
  <text x="680" y="161" fill="#444" font-size="9" font-family="monospace">avail: 204 Nm</text>
  <text x="680" y="174" fill="#444" font-size="9" font-family="monospace">GBox 90%/stage</text>
  <text x="680" y="187" fill="#444" font-size="9" font-family="monospace">F_eff: 299 N</text>

  <!-- ========== TITLE ========== -->
  <text x="390" y="24" text-anchor="middle" fill="#555"
        font-size="13" font-family="monospace">femur up vs femur down — side view</text>
  <text x="390" y="40" text-anchor="middle" fill="#333"
        font-size="10" font-family="monospace">L2=350mm  L3=800mm  scale≈0.65px/mm</text>

</svg>
